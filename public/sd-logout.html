<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Logout</title></head>
<body>
<script>
  // Called by SalesDriver broadcastLogout via hidden iframe
  // This page runs in MTN Data's origin, so it CAN access MTN Data's localStorage
  // After clearing, it redirects to force logout

  console.log('[sd-logout] MTN Data logout page loaded');

  var keys = ['access_token', 'userToken', 'salesdriver_email', 'salesdriver_name',
              'sd_user_email', 'sd_user_name', 'persist:auth', 'persist:root', 'persist:credits'];
  keys.forEach(function(k) { 
    try { 
      localStorage.removeItem(k); 
      console.log('[sd-logout] Removed:', k);
    } catch(e) {
      console.error('[sd-logout] Error removing:', k, e);
    } 
  });

  console.log('[sd-logout] MTN Data session cleared, redirecting to login...');

  // Redirect to login page - this forces MTN Data to logout
  setTimeout(function() {
    window.top.location.href = 'https://mtndata.com/login';
  }, 100);
</script>
</body>
</html>
