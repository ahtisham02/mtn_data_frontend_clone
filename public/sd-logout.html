<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Logout</title></head>
<body>
<script>
  // Called by SalesDriver broadcastLogout via hidden iframe
  // Clears MTN Data session — SSOAuthProvider polling picks up sd_logout flag

  console.log('[sd-logout] Clearing MTN Data session...');

  var keys = ['access_token', 'userToken', 'salesdriver_email', 'salesdriver_name',
              'sd_user_email', 'sd_user_name'];
  keys.forEach(function(k) { try { localStorage.removeItem(k); } catch(e) {} });

  // Set sd_logout flag — SSOAuthProvider polls this every 1s
  try {
    localStorage.setItem('sd_logout', Date.now().toString());
    setTimeout(function() { localStorage.removeItem('sd_logout'); }, 3000);
  } catch(e) {}

  console.log('[sd-logout] MTN Data session cleared');
</script>
</body>
</html>
