<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Logout Relay</title>
</head>
<body>
<script>
  // This page is opened by SalesDriver's broadcastLogout in a popup
  // It clears MTN Data session and closes itself
  
  console.log('[logout-relay] Clearing MTN Data session...');

  // Clear all auth tokens
  const keys = ['access_token', 'userToken', 'salesdriver_email', 'salesdriver_name', 'sd_user_email', 'sd_user_name'];
  keys.forEach(k => {
    try { localStorage.removeItem(k); } catch(e) {}
  });

  // Set logout flag for polling detection
  try {
    localStorage.setItem('sd_logout', Date.now().toString());
  } catch(e) {}

  console.log('[logout-relay] Session cleared, redirecting to login...');
  
  // Redirect to login page
  setTimeout(() => {
    window.location.href = '/login';
  }, 100);
</script>
</body>
</html>
